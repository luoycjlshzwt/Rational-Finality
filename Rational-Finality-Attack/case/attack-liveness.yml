# version: "3.9"

services:
  execute1:
    image: tscel/geth:v1.13-base-v5
    entrypoint: /usr/local/bin/execution.sh
    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./config:/root/config
      - ${BASEDIR}./data/execute1:/root/gethdata
      - ${BASEDIR}./execute.sh:/usr/local/bin/execution.sh
    ports:
      - "8545:8545"
    networks:
      meta:
        ipv4_address: 172.87.1.31

  execute2:
    image: tscel/geth:v1.13-base-v5
    entrypoint: /usr/local/bin/execution.sh
    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./config:/root/config
      - ${BASEDIR}./data/execute2:/root/gethdata
      - ${BASEDIR}./execute.sh:/usr/local/bin/execution.sh
    ports:
      - "8546:8545"
    networks:
      meta:
        ipv4_address: 172.87.1.32


  attacker1:
    image: bunnyfinder:latest
    entrypoint: attacker --config /root/config.toml --strategy liveness --max-hack-idx 6451 --logpath /root/attackerdata/d.log --loglevel debug
    environment:
      - NAME=attacker1

    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./config/attacker-config.toml:/root/config.toml
      - ${BASEDIR}./config/strategy-empty.json:/root/strategy.json
      - ${BASEDIR}./data/attacker1:/root/attackerdata
    networks:
      meta:
        ipv4_address: 172.87.1.150

  attacker2:
    image: bunnyfinder:latest
    entrypoint: attacker --config /root/config.toml --strategy livenessnormal --max-hack-idx 6451 --logpath /root/attackerdata/d.log --loglevel debug
    environment:
      - NAME=attacker2

    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./config/attacker-honest-config.toml:/root/config.toml
      - ${BASEDIR}./config/strategy-empty.json:/root/strategy.json
      - ${BASEDIR}./data/attacker2:/root/attackerdata
    networks:
      meta:
        ipv4_address: 172.87.1.151

  beacon1:
    image: tscel/bf.prysm:v5.2.0-liveness
    entrypoint: /usr/local/bin/beacon-node.sh
    environment:
      - ALLPEERS= --peer /ip4/172.87.1.3/tcp/13000/p2p/16Uiu2HAmQDMFQcKYKt2oTPS4uvYDbGxp3S8t7oGyd8maCSq2vSCV 
      - EXECUTE=execute1
      - MAXPEERS=70
      - P2PKEY=0692f57d5ddf34d0f2649d968bf82e2dda69d1f435a7f3a7a26d81a1a11e687b
      - ATTACKER_SERVICE_URL=http://172.87.1.150:10000

    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./beacon.sh:/usr/local/bin/beacon-node.sh
      - ${BASEDIR}./config:/root/config
      - ${BASEDIR}./data/beacon1:/root/beacondata
    ports:
      - "33001:4000"
      - "34001:3500"
    depends_on:
      - execute1
    networks:
      meta:
        ipv4_address: 172.87.1.2

  beacon2:
    image: tscel/bf.prysm:v5.2.0-liveness 
    entrypoint: /usr/local/bin/beacon-node.sh
    environment:
      - ALLPEERS= --peer /ip4/172.87.1.2/tcp/13000/p2p/16Uiu2HAmDaSUVFJ2yKW3zfagjSUxp9kz9EG8bQWa5P8HAGE2evD5  
      - EXECUTE=execute2
      - MAXPEERS=70
      - P2PKEY=9edcc99209261dfca0d5b79cd1ff43e2e30005c629337d921711bb77fa816dd3
      - ATTACKER_SERVICE_URL=http://172.87.1.151:10000

    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./beacon.sh:/usr/local/bin/beacon-node.sh
      - ${BASEDIR}./config:/root/config
      - ${BASEDIR}./data/beacon2:/root/beacondata
    ports:
      - "33002:4000"
      - "34002:3500"
    depends_on:
      - execute2
    networks:
      meta:
        ipv4_address: 172.87.1.3

  validator1:
    image: tscel/bf.prysm:v5.2.0-liveness
    entrypoint: /usr/local/bin/validator.sh
    environment:
      - VALIDATORS_NUM=6451
      - VALIDATORS_INDEX=0
      - BEACONRPC=beacon1:4000
      - ATTACKER_SERVICE_URL=http://172.87.1.150:10000

    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./validator.sh:/usr/local/bin/validator.sh
      - ${BASEDIR}./config:/root/config
      - ${BASEDIR}./data/validator1:/root/validatordata
    depends_on:
      - beacon1
    networks:
      meta:
        ipv4_address: 172.87.1.41

  validator2:
    image: tscel/bf.prysm:v5.2.0-liveness
    entrypoint: /usr/local/bin/validator.sh
    environment:
      - VALIDATORS_NUM=9677
      - VALIDATORS_INDEX=6451
      - BEACONRPC=beacon2:4000
      - ATTACKER_SERVICE_URL=http://172.87.1.151:10000

    deploy:
      restart_policy:
        condition: on-failure
        delay: 1s
        max_attempts: 100
        window: 120s
    volumes:
      - ${BASEDIR}./validator.sh:/usr/local/bin/validator.sh
      - ${BASEDIR}./config:/root/config
      - ${BASEDIR}./data/validator2:/root/validatordata
    depends_on:
      - beacon2
    networks:
      meta:
        ipv4_address: 172.87.1.42

networks:
  meta:
    driver: bridge
    ipam:
      config:
        - subnet: 172.87.1.0/24
